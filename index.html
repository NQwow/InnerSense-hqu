<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知心 - 温暖你的每一天</title>
    <!-- 立即应用主题，防止闪烁 -->
    <script>
        (function() {
            const theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>
    <link rel="stylesheet" href="src/css/theme.css">
    <link rel="stylesheet" href="src/css/main.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航栏 -->
        <header class="navbar">
            <div class="logo-container">
                <h1 class="logo">知心</h1>
                <span class="subtitle" id="randomSubtitle"></span>
            </div>
            <div class="nav-actions">
                <button class="mood-btn" onclick="navigateTo('mood')" title="我的心情记录">
                    <svg viewBox="0 0 24 24" width="24" height="24">
                        <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/>
                    </svg>
                </button>
                <button id="themeToggle" class="theme-btn" title="切换主题">
                    <svg class="theme-icon" viewBox="0 0 24 24" width="24" height="24">
                        <path class="moon-path" d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
            </div>
        </header>

        <!-- 主内容区域 -->
        <main class="main-content">
            <!-- 心情颜色日历 -->
            <section class="mood-calendar-section">
                <div class="calendar-header">
                    <h2 class="section-title">
                        <svg viewBox="0 0 24 24" width="28" height="28">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/>
                        </svg>
                        本月心情轨迹
                    </h2>
                    <p class="calendar-subtitle">记录每一天的情绪色彩</p>
                </div>
                <div class="mood-calendar" id="moodCalendar"></div>
                <div class="calendar-legend">
                    <span class="legend-item">
                        <span class="legend-color" style="background: #FFB6C1;"></span>
                        <span>开心</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color" style="background: #87CEEB;"></span>
                        <span>平静</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color" style="background: #FFD700;"></span>
                        <span>兴奋</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color" style="background: #DDA0DD;"></span>
                        <span>焦虑</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color" style="background: #98FB98;"></span>
                        <span>放松</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color" style="background: #6495ED;"></span>
                        <span>难过</span>
                    </span>
                    <span class="legend-item">
                        <span class="legend-color" style="background: #FF6B6B;"></span>
                        <span>生气</span>
                    </span>
                </div>
            </section>

            <div class="cards-container">
                <!-- 每日一句卡片 -->
                <div class="card card-everyday" onclick="navigateTo('everyday')">
                    <div class="card-icon heart-icon">
                        <svg viewBox="0 0 24 24" width="48" height="48">
                            <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                        </svg>
                    </div>
                    <h3 class="card-title">每日一句</h3>
                    <p class="card-desc">今日份治愈，温柔抵达</p>
                </div>

                <!-- 趣味小测试卡片 -->
                <div class="card card-quiz" onclick="navigateTo('quiz')">
                    <div class="card-icon star-icon">
                        <svg viewBox="0 0 24 24" width="48" height="48">
                            <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                        </svg>
                    </div>
                    <h3 class="card-title">趣味小测试</h3>
                    <p class="card-desc">测试你的心理性格</p>
                </div>

                <!-- 夸夸卡卡片 -->
                <div class="card card-praise" onclick="navigateTo('praise')">
                    <div class="card-icon book-icon">
                        <svg viewBox="0 0 24 24" width="48" height="48">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                    </div>
                    <h3 class="card-title">夸夸卡</h3>
                    <p class="card-desc">停止内耗，你超棒的</p>
                </div>

                <!-- 情绪工具箱卡片 -->
                <div class="card card-toolbox" onclick="navigateTo('toolbox')">
                    <div class="card-icon smile-icon">
                        <svg viewBox="0 0 24 24" width="48" height="48">
                            <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                        </svg>
                    </div>
                    <h3 class="card-title">情绪工具箱</h3>
                    <p class="card-desc">方法不止呼吸，快速稳住情绪</p>
                </div>
            </div>
        </main>

        <!-- 底部导航栏 -->
        <nav class="bottom-nav">
            <div class="nav-item active" onclick="navigateTo('home')">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/>
                </svg>
                <span>首页</span>
            </div>
            <div class="nav-item" onclick="navigateTo('everyday')">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                </svg>
                <span>一句</span>
            </div>
            <div class="nav-item" onclick="navigateTo('quiz')">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M12 2l3.09 6.26L22 9.27l-5 4.87 1.18 6.88L12 17.77l-6.18 3.25L7 14.14 2 9.27l6.91-1.01L12 2z"/>
                </svg>
                <span>测试</span>
            </div>
            <div class="nav-item" onclick="navigateTo('praise')">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                </svg>
                <span>夸夸</span>
            </div>
            <div class="nav-item" onclick="navigateTo('toolbox')">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm3.5-9c.83 0 1.5-.67 1.5-1.5S16.33 8 15.5 8 14 8.67 14 9.5s.67 1.5 1.5 1.5zm-7 0c.83 0 1.5-.67 1.5-1.5S9.33 8 8.5 8 7 8.67 7 9.5 7.67 11 8.5 11zm3.5 6.5c2.33 0 4.31-1.46 5.11-3.5H6.89c.8 2.04 2.78 3.5 5.11 3.5z"/>
                </svg>
                <span>工具</span>
            </div>
            <div class="nav-item" onclick="navigateTo('mood')">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8zm-5-9h10v2H7z"/>
                </svg>
                <span>心情</span>
            </div>
        </nav>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <script src="src/js/theme.js"></script>
    <script src="src/js/pathUtils.js"></script>
    <script src="src/js/clickEffect.js"></script>
    <script src="src/js/main.js"></script>
</body>
</html>
