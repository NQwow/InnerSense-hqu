<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>每日一句 - 知心</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/everyday.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航栏 -->
        <header class="navbar">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                返回首页
            </button>
            <h1 class="page-title">每日一句</h1>
        </header>

        <!-- 便签内容 -->
        <main class="note-container">
            <div class="note-card">
                <div class="note-date" id="currentDate"></div>
                <div class="note-content" id="quoteContent"></div>
                <div class="note-decoration">
                    <svg class="heart-deco" viewBox="0 0 24 24" width="30" height="30">
                        <path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/>
                    </svg>
                </div>
            </div>
        </main>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/clickEffect.js"></script>
    <script src="../../js/everyday.js"></script>
</body>
</html>
