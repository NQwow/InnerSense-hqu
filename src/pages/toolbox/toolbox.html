<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>情绪工具箱 - 知心</title>
    <link rel="stylesheet" href="../../css/theme.css">
    <link rel="stylesheet" href="../../css/toolbox.css">
</head>
<body>
    <div id="app">
        <!-- 顶部导航栏 -->
        <header class="navbar">
            <button class="back-btn" onclick="goBack()">
                <svg viewBox="0 0 24 24" width="24" height="24">
                    <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                </svg>
                返回首页
            </button>
            <h1 class="page-title">情绪工具箱</h1>
        </header>

        <!-- 工具卡片网格 -->
        <main class="toolbox-container">
            <div class="tools-grid">
                <!-- 深呼吸放松法 -->
                <div class="tool-card tool-breathing" onclick="showToolDetail('breathing')">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" width="50" height="50">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 15l-5-5 1.41-1.41L10 14.17l7.59-7.59L19 8l-9 9z"/>
                        </svg>
                    </div>
                    <h3 class="tool-title">深呼吸放松法</h3>
                </div>

                <!-- 正念冥想 -->
                <div class="tool-card tool-meditation" onclick="showToolDetail('meditation')">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" width="50" height="50">
                            <path d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm0 18c-4.41 0-8-3.59-8-8s3.59-8 8-8 8 3.59 8 8-3.59 8-8 8z"/>
                        </svg>
                    </div>
                    <h3 class="tool-title">正念冥想</h3>
                </div>

                <!-- 运动调节 -->
                <div class="tool-card tool-exercise" onclick="showToolDetail('exercise')">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" width="50" height="50">
                            <path d="M13.5 5.5c1.1 0 2-.9 2-2s-.9-2-2-2-2 .9-2 2 .9 2 2 2zM9.8 8.9L7 23h2.1l1.8-8 2.1 2v6h2v-7.5l-2.1-2 .6-3C14.8 12 16.8 13 19 13v-2c-1.9 0-3.5-1-4.3-2.4l-1-1.6c-.4-.6-1-1-1.7-1-.3 0-.5.1-.8.1L6 8.3V13h2V9.6l1.8-.7"/>
                        </svg>
                    </div>
                    <h3 class="tool-title">运动调节</h3>
                </div>

                <!-- 艺术创作 -->
                <div class="tool-card tool-art" onclick="showToolDetail('art')">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" width="50" height="50">
                            <path d="M12 3c-4.97 0-9 4.03-9 9s4.03 9 9 9c.83 0 1.5-.67 1.5-1.5 0-.39-.15-.74-.39-1.01-.23-.26-.38-.61-.38-.99 0-.83.67-1.5 1.5-1.5H16c2.76 0 5-2.24 5-5 0-4.42-4.03-8-9-8zm-5.5 9c-.83 0-1.5-.67-1.5-1.5S5.67 9 6.5 9 8 9.67 8 10.5 7.33 12 6.5 12zm3-4C8.67 8 8 7.33 8 6.5S8.67 5 9.5 5s1.5.67 1.5 1.5S10.33 8 9.5 8zm5 0c-.83 0-1.5-.67-1.5-1.5S13.67 5 14.5 5s1.5.67 1.5 1.5S15.33 8 14.5 8zm3 4c-.83 0-1.5-.67-1.5-1.5S16.67 9 17.5 9s1.5.67 1.5 1.5-.67 1.5-1.5 1.5z"/>
                        </svg>
                    </div>
                    <h3 class="tool-title">艺术创作</h3>
                </div>

                <!-- 音乐调节 -->
                <div class="tool-card tool-music" onclick="showToolDetail('music')">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" width="50" height="50">
                            <path d="M12 3v10.55c-.59-.34-1.27-.55-2-.55-2.21 0-4 1.79-4 4s1.79 4 4 4 4-1.79 4-4V7h4V3h-6z"/>
                        </svg>
                    </div>
                    <h3 class="tool-title">音乐调节</h3>
                </div>

                <!-- 倾诉交流 -->
                <div class="tool-card tool-talk" onclick="showToolDetail('talk')">
                    <div class="tool-icon">
                        <svg viewBox="0 0 24 24" width="50" height="50">
                            <path d="M20 2H4c-1.1 0-1.99.9-1.99 2L2 22l4-4h14c1.1 0 2-.9 2-2V4c0-1.1-.9-2-2-2zM6 9h12v2H6V9zm8 5H6v-2h8v2zm4-6H6V6h12v2z"/>
                        </svg>
                    </div>
                    <h3 class="tool-title">倾诉交流</h3>
                </div>
            </div>
        </main>

        <!-- 详情弹窗 -->
        <div id="detailModal" class="modal">
            <div class="modal-content">
                <span class="close-btn" onclick="closeModal()">&times;</span>
                <h2 id="modalTitle"></h2>
                <div id="modalBody"></div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/vue@2.6.14/dist/vue.min.js"></script>
    <script src="../../js/theme.js"></script>
    <script src="../../js/clickEffect.js"></script>
    <script src="../../js/toolbox.js"></script>
</body>
</html>
